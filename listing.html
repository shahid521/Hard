<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Listing Details</title>
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/layout.css">
</head>
<body>
    <header class="navbar">
        <div class="logo"><a href="index.html">MARKET.</a></div>
        <nav class="nav-links">
            <a href="dashboard.html">Sell</a>
            <a href="messages.html">Messages</a>
            <a href="dashboard.html">Profile</a>
        </nav>
    </header>

    <main class="listing-container">
        <div class="media-column">
            <div class="main-image">Item Image Placeholder</div>
            <div class="thumbnail-grid">
                <div class="thumb">Thumb 1</div>
                <div class="thumb">Thumb 2</div>
                <div class="thumb">Thumb 3</div>
            </div>
        </div>
        
        <div class="details-column">
            <h1 class="listing-title">Professional Laptop - 16GB RAM</h1>
            <p class="listing-price">$450.00</p>
            <p class="listing-description">Condition is excellent. Used for coding projects locally. No scratches.</p>
            
            <div class="seller-box">
                <div class="avatar"></div>
                <div class="seller-stats">
                    <strong>SellerName123</strong>
                    <p>Rating: 4.9 | Member since 2024</p>
                </div>
            </div>
            
            <button class="action-btn">Contact Seller</button>
        </div>
    </main>
</body>
</html>
