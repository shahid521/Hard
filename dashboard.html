<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/layout.css">
</head>
<body>
    <header class="navbar">
        <div class="logo"><a href="index.html">MARKET.</a></div>
        <nav class="nav-links">
            <a href="index.html">Home</a>
            <a href="messages.html">Messages</a>
        </nav>
    </header>

    <main class="dashboard-container">
        <aside class="sidebar-nav">
            <a href="#" class="active">Active Listings</a>
            <a href="#">Post New Item</a>
            <a href="#">Settings</a>
        </aside>
        
        <section class="dashboard-content">
            <h2>Your Active Listings</h2>
            <table class="data-table">
                <thead>
                    <tr>
                        <th>Item</th>
                        <th>Price</th>
                        <th>Status</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>Professional Laptop</td>
                        <td>$450.00</td>
                        <td>Active</td>
                        <td><a href="#">Edit</a> | <a href="#">Delete</a></td>
                    </tr>
                    <tr>
                        <td>Mechanical Keyboard</td>
                        <td>$65.00</td>
                        <td>Active</td>
                        <td><a href="#">Edit</a> | <a href="#">Delete</a></td>
                    </tr>
                </tbody>
            </table>
            
            <div class="post-form-area" style="margin-top: 40px;">
                <h2>Post New Item</h2>
                <form class="static-form">
                    <label>Title</label>
                    <input type="text" placeholder="Item name">
                    <label>Price</label>
                    <input type="number" placeholder="0.00">
                    <label>Description</label>
                    <textarea rows="4" placeholder="Item details..."></textarea>
                    <label>Image Upload</label>
                    <div class="image-drop">Click to select file (Static)</div>
                    <button type="button" class="action-btn">Post Item</button>
                </form>
            </div>
        </section>
    </main>
</body>
</html>
